Configuration:
  StackGroup:
    type: object
    properties:
      label: { type: string }
      items:
        type: array
        items: { type: string }
    required: [label, items]

  EngineeringStack:
    type: object
    properties:
      subtitle: { type: string }
      groups:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/StackGroup"
    required: [subtitle, groups]

  TechnicalCategory:
    type: object
    properties:
      title:
        type: string
      icon:
        type: string
        enum:
          - cpu
          - database
          - cloud
          - network
          - testing
          - cicd
      items:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/TechnicalItem"
      chips:
        type: array
        items:
          type: string
    required:
      - title
      - icon
      - items

  TechnicalItem:
    type: object
    properties:
      title:
        type: string
      badge:
        type: string
      desc:
        type: string
    required:
      - title
      - badge
      - desc

  HomeConfig:
    type: object
    properties:
      secondSubtitles:
        type: array
        items:
          type: string
      linkSize:
        type: string
      constantAvatarLazyLoaderDelay:
        type: number
    required:
      - secondSubtitles
      - linkSize
      - constantAvatarLazyLoaderDelay

  DetailedSection:
    type: object
    properties:
      id:
        type: string
      title:
        type: string
      content:
        type: string
      keyContribution:
        type: string
    required:
      - id
      - title
      - content

  ProjectItem:
    type: object
    properties:
      id:
        type: string
      subTitle:
        type: string
      category:
        type: string
      fullDescription:
        type: string
      links:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/SocialsItem"
      stats:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/MetricsItem"
      detailedSections:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/DetailedSection"
      title:
        type: string
      tags:
        type: array
        items:
          type: string
      problem:
        type: object
        properties:
          title:
            type: string
          description:
            type: string
        required:
          - title
          - description
      technicalDecisions:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/TechnicalDecision"
      engineering:
        type: object
        properties:
          title:
            type: string
          description:
            type: string
        required:
          - title
          - description
      impact:
        type: object
        properties:
          value:
            type: string
          description:
            type: string
        required:
          - value
          - description
      architecture:
        type: object
        properties:
          title:
            type: string
          controlPlane:
            type: object
            properties:
              label:
                type: string
              items:
                type: array
                items:
                  type: string
            required:
              - label
              - items
          dataPlane:
            type: object
            properties:
              label:
                type: string
              nodes:
                type: array
                items:
                  type: string
            required:
              - label
              - nodes
          layers:
            type: array
            items:
              $ref: "./docs/types/Configuration.yaml#/Configuration/ProjectItemArchitectureLayer"
        required:
          - title
      engineeringStack:
        $ref: "./docs/types/Configuration.yaml#/Configuration/EngineeringStack"
      measurableImpact:
        $ref: "./docs/types/Configuration.yaml#/Configuration/MeasurableImpact"
      postmortem:
        $ref: "./docs/types/Configuration.yaml#/Configuration/Postmortem"
    required:
      - id
      - title
      - tags
      - problem
      - engineering
      - impact
      - architecture

  ProjectItemArchitectureLayerNode:
    type: object
    properties:
      icon: { type: string }
      label: { type: string }
      description: { type: string }
    required: [icon, label, description]

  ProjectItemArchitectureLayer:
    type: object
    properties:
      label: { type: string }
      nodes:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/ProjectItemArchitectureLayerNode"
    required: [label, nodes]

  GitHubConfig:
    type: object
    properties:
      githubApiUrl:
        type: string
      githubApiVersion:
        type: string
      githubUserName:
        type: string
      githubPageIterations:
        type: number

  ExperienceItem:
    type: object
    properties:
      role:
        type: string
      company:
        type: string
      period:
        type: string
      description:
        type: string
      scaleImpact:
        type: string
    required:
      - role
      - company
      - period
      - description
      - scaleImpact

  PhilosophyIcon:
    type: string
    enum:
      - bolt
      - pulse
      - shield

  PhilosophyItem:
    type: object
    properties:
      title:
        type: string
      quote:
        type: string
      icon:
        $ref: "./docs/types/Configuration.yaml#/Configuration/PhilosophyIcon"
    required:
      - title
      - quote
      - icon

  SocialsItem:
    type: object
    properties:
      label: { type: string }
      url: { type: string }
    required: [label, url]

  ContactConfig:
    type: object
    properties:
      subtitle: { type: string }
      title: { type: string }
      highlight: { type: string }
      description: { type: string }
      ctaText: { type: string }
      socials:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/SocialsItem"
    required: [subtitle, title, highlight, description, ctaText, socials]

  MetricsItem:
    type: object
    properties:
      label: { type: string }
      value: { type: string }
    required: [label, value]

  FooterConfig:
    type: object
    properties:
      brand:
        type: object
        properties:
          title: { type: string }
          description: { type: string }
        required: [title, description]
      navLinks:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/SocialsItem"
      connectLinks:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/SocialsItem"
      metrics:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/MetricsItem"
      copyright: { type: string }
    required: [brand, navLinks, connectLinks, metrics, copyright]

  TechnicalDecisionOption:
    type: object
    properties:
      label: { type: string }
      isChosen: { type: boolean }
    required: [label, isChosen]

  TechnicalDecision:
    type: object
    properties:
      title: { type: string }
      options:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/TechnicalDecisionOption"
      rationale: { type: string }
    required: [title, options, rationale]

  MeasurableImpactItem:
    type: object
    properties:
      label: { type: string }
      value: { type: string }
      subValue: { type: string }
      trend: { type: string }
    required: [label, value, trend]

  MeasurableImpact:
    type: object
    properties:
      subtitle: { type: string }
      items:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/MeasurableImpactItem"
    required: [subtitle, items]

  PostmortemItem:
    type: object
    properties:
      title: { type: string }
      content: { type: string }
    required: [title, content]

  Postmortem:
    type: object
    properties:
      subtitle: { type: string }
      items:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/PostmortemItem"
    required: [subtitle, items]
