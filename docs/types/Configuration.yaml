Configuration:
  TechnicalCategory:
    type: object
    properties:
      title:
        type: string
      icon:
        type: string
        enum:
          - cpu
          - database
          - cloud
          - network
          - testing
          - cicd
      items:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/TechnicalItem"
      chips:
        type: array
        items:
          type: string
    required:
      - title
      - icon
      - items

  TechnicalItem:
    type: object
    properties:
      title:
        type: string
      badge:
        type: string
      desc:
        type: string
    required:
      - title
      - badge
      - desc

  HomeConfig:
    type: object
    properties:
      secondSubtitles:
        type: array
        items:
          type: string
      linkSize:
        type: string
      constantAvatarLazyLoaderDelay:
        type: number
    required:
      - secondSubtitles
      - linkSize
      - constantAvatarLazyLoaderDelay

  ProjectItem:
    type: object
    properties:
      title:
        type: string
      tags:
        type: array
        items:
          type: string
      problem:
        type: object
        properties:
          title:
            type: string
          description:
            type: string
        required:
          - title
          - description
      engineering:
        type: object
        properties:
          title:
            type: string
          description:
            type: string
        required:
          - title
          - description
      impact:
        type: object
        properties:
          value:
            type: string
          description:
            type: string
        required:
          - value
          - description
      architecture:
        type: object
        properties:
          title:
            type: string
          controlPlane:
            type: object
            properties:
              label:
                type: string
              items:
                type: array
                items:
                  type: string
            required:
              - label
              - items
          dataPlane:
            type: object
            properties:
              label:
                type: string
              nodes:
                type: array
                items:
                  type: string
            required:
              - label
              - nodes
        required:
          - title
          - controlPlane
          - dataPlane
    required:
      - title
      - tags
      - problem
      - engineering
      - impact
      - architecture

  GitHubConfig:
    type: object
    properties:
      githubApiUrl:
        type: string
      githubApiVersion:
        type: string
      githubUserName:
        type: string
      githubPageIterations:
        type: number

  ExperienceItem:
    type: object
    properties:
      role:
        type: string
      company:
        type: string
      period:
        type: string
      description:
        type: string
      scaleImpact:
        type: string
    required:
      - role
      - company
      - period
      - description
      - scaleImpact

  PhilosophyIcon:
    type: string
    enum:
      - bolt
      - pulse
      - shield

  PhilosophyItem:
    type: object
    properties:
      title:
        type: string
      quote:
        type: string
      icon:
        $ref: "./docs/types/Configuration.yaml#/Configuration/PhilosophyIcon"
    required:
      - title
      - quote
      - icon

  SocialsItem:
    type: object
    properties:
      label: { type: string }
      url: { type: string }
    required: [label, url]

  ContactConfig:
    type: object
    properties:
      subtitle: { type: string }
      title: { type: string }
      highlight: { type: string }
      description: { type: string }
      ctaText: { type: string }
      socials:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/SocialsItem"
    required: [subtitle, title, highlight, description, ctaText, socials]

  MetricsItem:
    type: object
    properties:
      label: { type: string }
      value: { type: string }
    required: [label, value]

  FooterConfig:
    type: object
    properties:
      brand:
        type: object
        properties:
          title: { type: string }
          description: { type: string }
        required: [title, description]
      navLinks:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/SocialsItem"
      connectLinks:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/SocialsItem"
      metrics:
        type: array
        items:
          $ref: "./docs/types/Configuration.yaml#/Configuration/MetricsItem"
      copyright: { type: string }
    required: [brand, navLinks, connectLinks, metrics, copyright]
